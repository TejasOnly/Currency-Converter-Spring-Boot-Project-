spring.application.name=backend

# H2 In-Memory Database (no MySQL required)
spring.datasource.url=jdbc:h2:mem:tejnestdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT Configuration
tejnest.app.jwtSecret=TejNestSecureSecretKeyForJWTAuthTokenGeneration20261234
tejnest.app.jwtExpirationMs=86400000
